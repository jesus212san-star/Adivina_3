<!DOCTYPE html>
<html>
<head>
    <title>Adivina el Número</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ESTILO PARA EL VIDEO DE FONDO */
        #video-fondo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
        }

        /* Caja con efecto cristal */
       .caja {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 400px;
            width: 90%;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            text-align: center;
            animation: aparecer 1s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #ffffff;
            font-size: 2.2em;
            margin-bottom: 10px;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }

        p {
            color: #f0f0f0;
            font-size: 1.1em;
            margin-bottom: 25px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
        }

        input {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 14px;
            font-size: 20px;
            width: 110px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder { color: #e0e0e0; }

        input:focus {
            border-color: #a29bfe;
            box-shadow: 0 0 15px rgba(162, 155, 254, 0.5);
        }

        button {
            padding: 14px 24px;
            font-size: 16px;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin: 10px 5px;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        button:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        button:active { transform: scale(0.98); }

       .btn-comprobar { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
       .btn-comprobar:hover { background: linear-gradient(135deg, #5b4cdb, #9189f8); }

       .btn-reiniciar { background: linear-gradient(135deg, #fd79a8, #fdcb6e); }
       .btn-reiniciar:hover { background: linear-gradient(135deg, #fd6198, #fcc85c); }

        #mensaje {
            margin-top: 30px;
            font-size: 22px;
            font-weight: 500;
            padding: 15px;
            border-radius: 12px;
            min-height: 30px;
            transition: all 0.5s ease;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <!-- 🎬 AQUÍ PONES EL VIDEO DE FONDO -->
    <!-- Solo cambia el link dentro de src="..." por tu video -->
    <video id="video-fondo" autoplay muted loop playsinline>
        <source src="Relaxing Frog Animation _ Peaceful Pond Aesthetic with Calming Piano Music(MP4).mp4" type="video/mp4">
    </video>

    <div class="caja">
        <h1>🎮 Adivina el Número</h1>
        <p>Ingresa un número entre 1 y 10:</p>

        <input type="number" id="numero" min="1" max="10" placeholder="?">
        <br><br>

        <button class="btn-comprobar" onclick="comprobar()">✅ ¡COMPROBAR!</button>
        <button class="btn-reiniciar" onclick="reiniciar()">🔄 REINICIAR</button>

        <div id="mensaje"></div>
    </div>

    <script>
        // TU CÓDIGO JAVASCRIPT EXACTO
        let numeroSecreto = Math.floor(Math.random() * 10) + 1;

        function comprobar() {
          let input = document.getElementById("numero").value;
          let numero = Number(input);
          let mensaje = document.getElementById("mensaje");

          if (input === "") {
            mensaje.textContent = "Escribe un número";
            mensaje.style.color = "red";
            return;
          }

          if (numero === numeroSecreto) {
            mensaje.textContent = "¡ADIVINASTE!";
            mensaje.style.color = "#00ff9c";

          } else if (numero >= 1 && numero <= 5) {
            mensaje.textContent = "El número es MENOR";
            mensaje.style.color = "#74b9ff";

          } else if (numero >= 6 && numero <= 10) {
            mensaje.textContent = "El número es MAYOR";
            mensaje.style.color = "#74b9ff";

          } else {
            mensaje.textContent = "Escribe un número del 1 al 10";
            mensaje.style.color = "red";
          }
        }

        function reiniciar() {
          numeroSecreto = Math.floor(Math.random() * 10) + 1;
          document.getElementById("numero").value = "";
          document.getElementById("mensaje").textContent = "Nuevo juego iniciado";
          document.getElementById("mensaje").style.color = "white";
        }
    </script>

</body>
</html>
